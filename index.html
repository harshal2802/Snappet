    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snappet</title>
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Snappet" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="description" content="A hub of lightweight single-page web apps — calculators, developer tools, productivity apps. Works offline." />
    <link rel="icon" type="image/svg+xml" href="/Snappet/snappet.svg" />
    <!-- apple-touch-icon and manifest <link> are auto-injected by vite-plugin-pwa -->
    <!-- Dark mode: apply class synchronously before React mounts to prevent flash -->
    <script>
      if (
        localStorage.getItem('snappet-dark-mode') === 'true' ||
        (!localStorage.getItem('snappet-dark-mode') &&
          window.matchMedia('(prefers-color-scheme: dark)').matches)
      ) {
        document.documentElement.classList.add('dark')
      }
    </script>
    <!-- GitHub Pages SPA redirect: restores path encoded by 404.html -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          )
        }
      })(window.location)
    </script>
    <script type="module" crossorigin src="/Snappet/assets/index-C-TcDgUX.js"></script>
