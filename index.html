    <!-- Dark mode: apply class synchronously before React mounts to prevent flash -->
    <script>
      if (
        localStorage.getItem('snappet-dark-mode') === 'true' ||
        (!localStorage.getItem('snappet-dark-mode') &&
          window.matchMedia('(prefers-color-scheme: dark)').matches)
      ) {
        document.documentElement.classList.add('dark')
      }
    </script>
    <!-- GitHub Pages SPA redirect: restores path encoded by 404.html -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          )
        }
      })(window.location)
    </script>
