<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Snappet</title>
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Snappet" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="description" content="Snappet is a hub of 20+ free, privacy-friendly browser tools — calculators, developer utilities, productivity apps, a video editor and more. No sign-up, works offline." />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta property="og:site_name" content="Snappet" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://harshal2802.github.io/Snappet/pwa-512x512.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://harshal2802.github.io/Snappet/" />
    <link rel="icon" type="image/svg+xml" href="/Snappet/snappet.svg" />
    <!-- apple-touch-icon and manifest <link> are auto-injected by vite-plugin-pwa -->
    <!-- Dark mode: apply class synchronously before React mounts to prevent flash -->
    <script>
      if (
        localStorage.getItem('snappet-dark-mode') === 'true' ||
        (!localStorage.getItem('snappet-dark-mode') &&
          window.matchMedia('(prefers-color-scheme: dark)').matches)
      ) {
        document.documentElement.classList.add('dark')
      }
    </script>
    <!-- GitHub Pages SPA redirect: restores path encoded by 404.html -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          )
        }
      })(window.location)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
