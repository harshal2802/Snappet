<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Snappet</title>
    <!--
      GitHub Pages SPA redirect (spa-github-pages technique).
      Encodes the requested path into a query string and redirects to index.html,
      which reads it back and restores the real URL via history.replaceState.
      pathSegmentsToKeep = 1 preserves the /Snappet/ repo prefix.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search
            ? '&' + l.search.slice(1).replace(/&/g, '~and~')
            : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
